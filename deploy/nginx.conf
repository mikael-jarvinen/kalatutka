server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Defense-in-depth response headers. The CSP is restrictive but compatible
    # with the current frontend (one inline-style usage; no inline scripts).
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header X-Frame-Options "DENY" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    location /data/ {
        # Force revalidation so a freshly refreshed data.js is picked up on
        # the next page load instead of getting served from a stale cache.
        add_header Cache-Control "no-cache, must-revalidate";
        try_files $uri =404;
    }

    # Don't expose the snapshot through directory listings, but allow direct
    # GET so it's debuggable from a browser.
    location = /data {
        return 404;
    }

    # Tiny health endpoint for the reverse proxy / docker healthcheck.
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
