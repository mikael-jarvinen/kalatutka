server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Standard static-asset caching. Long for the bundled HTML/CSS/JS — they
    # only change when the image is rebuilt — and short for the data files
    # which the refresh container rewrites on its schedule.
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    location /data/ {
        # Force revalidation so a freshly refreshed data.js is picked up on
        # the next page load instead of getting served from a stale cache.
        add_header Cache-Control "no-cache, must-revalidate";
        try_files $uri =404;
    }

    # Don't expose the snapshot through directory listings, but allow direct
    # GET so it's debuggable from a browser.
    location = /data {
        return 404;
    }

    # Tiny health endpoint for the reverse proxy / docker healthcheck.
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
